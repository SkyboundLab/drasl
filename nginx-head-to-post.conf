map $request_method $proxy_method {
    HEAD     POST;
    default  $request_method;
}

server {
    # Convert HEAD to POST for authlib-injector auth endpoints
    location ~ ^/authlib-injector/authserver/(authenticate|refresh)$ {
        proxy_method $proxy_method;
        proxy_pass http://drasl:3033;
    }

    # Also handle base paths
    location ~ ^/(authenticate|refresh)$ {
        proxy_method $proxy_method;
        proxy_pass http://drasl:3033;
    }
}
